<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KhamChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #0b141a; }
      .h-screen-dynamic { height: 100vh; height: calc(var(--vh, 1vh) * 100); }
      .scroller-zone { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111b21; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
      .tab-active { color: #00a884; border-bottom: 2px solid #00a884; }
    </style>
</head>
<body class="text-gray-200 antialiased select-none">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 bg-[#0b141a] z-50 flex justify-center items-center p-4">
        <div class="w-full max-w-md bg-[#222e35] p-8 rounded-2xl border-[#2a3942] shadow-2xl text-center">
            <div class="w-20 h-20 bg-[#00a884] rounded-full flex items-center justify-center mx-auto mb-4 text-4xl font-bold text-[#111b21] shadow-lg">K</div>
            <h1 class="text-3xl font-bold text-white tracking-wide">KhamChat</h1>
            <p class="text-gray-400 text-sm mt-1 mb-6">Private Chat • Instant Live Sync</p>
            <div id="auth-alert" class="hidden mb-4 p-3 rounded-lg text-xs font-medium bg-red-500/10 border-red-500/30 text-red-400"></div>
            <form id="auth-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Email</label>
                    <input type="email" id="email" required placeholder="name@gmail.com" class="w-full bg-[#2a3942] border-transparent focus:border-[#00a884] rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="password" required placeholder="••••" class="w-full bg-[#2a3942] border-transparent focus:border-[#00a884] rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="submit" id="btn-login" class="flex-1 bg-[#00a884] hover:bg-[#009675] text-[#111b21] font-bold py-3.5 rounded-xl text-sm">Sign In</button>
                    <button type="button" id="btn-register" class="flex-1 bg-transparent hover:bg-gray-800 border-gray-600 text-white font-semibold py-3.5 rounded-xl text-sm">Register</button>
                </div>
            </form>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden w-full h-screen-dynamic flex flex-col bg-[#111b21]">
        <!-- CHAT LIST SCREEN -->
        <div id="chat-list-screen" class="flex-1 flex-col">
            <div class="bg-[#202c33] px-4 pt-3 pb-2 flex-shrink-0">
                <div class="flex items-center justify-between mb-3">
                    <h1 class="text-2xl font-bold text-white">KhamChat</h1>
                    <div class="flex items-center gap-5 text-gray-300">
                        <button id="btn-settings" class="hover:text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                        </button>
                        <button id="btn-logout" class="text-gray-400 hover:text-red-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        </button>
                    </div>
                </div>
                <div class="bg-[#2a3942] rounded-xl px-4 py-2.5 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <input id="search-input" type="text" placeholder="Search users..." class="bg-transparent outline-none text-sm text-white placeholder-gray-400 flex-1">
                </div>
            </div>
            <div id="chat-list" class="flex-1 scroller-zone bg-[#111b21]">
                <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center px-6">
                    <p class="text-gray-400 text-sm">Loading users...</p>
                </div>
                <div id="chat-items"></div>
            </div>
        </div>

        <!-- CHAT WINDOW SCREEN -->
        <div id="chat-window-screen" class="hidden flex-1 flex-col bg-[#0b141a]">
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-4 border-b border-[#222e35] z-10 flex-shrink-0">
                <div class="flex items-center space-x-3">
                    <button id="back-to-list" class="text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <div id="chat-avatar" class="w-10 h-10 bg-[#00a884] rounded-full flex items-center justify-center font-semibold text-lg text-white uppercase"></div>
                    <div>
                        <h2 id="chat-title" class="text-sm font-semibold text-white tracking-wide">User</h2>
                        <p class="text-xs text-gray-400">online</p>
                    </div>
                </div>
            </div>
            <div id="messages-area" class="flex-1 scroller-zone p-6 space-y-4 z-10"></div>
            <div class="p-3 bg-[#202c33] border-t border-[#222e35] z-10 flex-shrink-0">
                <form id="chat-composer" class="w-full flex items-center space-x-3">
                    <input type="text" id="msg-input" placeholder="Type a message" autocomplete="off" required class="flex-1 bg-[#2a3942] text-sm text-white placeholder-gray-400 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-[#00a884]">
                    <button type="submit" class="bg-[#00a884] hover:bg-[#009675] text-[#111b21] p-3.5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9-2-9-18-9 18 9-2zm0 0v-8" /></svg></button>
                </form>
            </div>
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex justify-center items-center">
            <div class="bg-[#222e35] w- w-full max-w-sm p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4 text-white">Settings</h2>
                <div class="space-y-3">
                    <div><p class="text-xs text-gray-400">Logged in as</p><p id="set-email" class="text-white font-medium"></p></div>
                    <button id="close-settings" class="w-full bg-[#00a884] text-[#111b21] font-bold py-3 rounded-xl">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",authDomain: "khamchat-1d5a4.firebaseapp.com",projectId: "khamchat-1d5a4",storageBucket: "khamchat-1d5a4.firebasestorage.app",messagingSenderId: "515176934851",appId: "1:515176934851:web:4ec261196d1ff497666176"};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let activeNickname = "";
        let currentChatId = null;
        let currentChatUser = null;

        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const chatListScreen = document.getElementById('chat-list-screen');
        const chatWindowScreen = document.getElementById('chat-window-screen');
        const chatItems = document.getElementById('chat-items');
        const messagesArea = document.getElementById('messages-area');

        const syncViewportHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', syncViewportHeight); syncViewportHeight();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                activeNickname = user.email.split('@')[0];
                await setDoc(doc(db, "users", user.uid), {uid: user.uid, email: user.email, name: activeNickname}, {merge: true});
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadUsers();
            } else {
                currentUser = null;
                appScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        document.getElementById('btn-login').addEventListener('click', async (e) => {e.preventDefault();const email = document.getElementById('email').value.trim();const password = document.getElementById('password').value;await signInWithEmailAndPassword(auth, email, password).catch(err => displayAlert(err.message));});
        document.getElementById('btn-register').addEventListener('click', async (e) => {e.preventDefault();const email = document.getElementById('email').value.trim();const password = document.getElementById('password').value;await createUserWithEmailAndPassword(auth, email, password).catch(err => displayAlert(err.message));});
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // LOAD ALL USERS FOR PRIVATE CHAT
        async function loadUsers() {
            const snap = await getDocs(collection(db, "users"));
            chatItems.innerHTML = '';
            snap.forEach(d => {
                if(d.id === currentUser.uid) return;
                const u = d.data();
                const div = document.createElement('div');
                div.className = "flex items-center px-4 py-3 hover:bg-[#202c33] cursor-pointer border-b border-[#222e35]/30";
                div.innerHTML = `<div class="w-12 h-12 bg-[#00a884] rounded-full flex items-center justify-center font-bold text-xl mr-3 text-white uppercase">${u.name.charAt(0)}</div><div><p class="text-sm font-semibold text-white">${u.name}</p><p class="text-xs text-gray-400">Tap to chat</p></div>`;
                div.onclick = () => openChatWindow(u.uid, u.name);
                chatItems.appendChild(div);
            });
        }

        // PRIVATE CHAT ID GENERATOR
        function getChatId(uid1, uid2) { return uid1 < uid2? `${uid1}_${uid2}` : `${uid2}_${uid1}`; }

        window.openChatWindow = function(uid, name) {
            currentChatId = getChatId(currentUser.uid, uid);
            currentChatUser = {uid, name};
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').innerText = name.charAt(0);
            chatListScreen.classList.add('hidden');
            chatWindowScreen.classList.remove('hidden');
            startStreamingDatabase();
        }
        document.getElementById('back-to-list').onclick = () => {chatWindowScreen.classList.add('hidden');chatListScreen.classList.remove('hidden');}

        // REAL TIME PRIVATE MESSAGES
        function startStreamingDatabase() {
            const q = query(collection(db, "chats", currentChatId, "messages"), orderBy("createdAt", "asc"));
            onSnapshot(q, (snapshot) => {
                messagesArea.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isSelf = data.uid === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `flex flex-col w-full ${isSelf? 'items-end' : 'items-start'}`;
                    div.innerHTML = `
                        <div class="max-w-[85%]">
                            <div class="px-3.5 py-2 rounded-xl text-[14px] break-words ${isSelf? 'bg-[#005c4b] text-white rounded-tr-none' : 'bg-[#202c33] text-gray-100 rounded-tl-none'}">
                                <p class="whitespace-pre-wrap">${stripHTML(data.messageBody)}</p>
                                <span class="text-[9px] text-gray-400/90 block text-right mt-1">${data.createdAt? data.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'now'}</span>
                            </div>
                        </div>`;
                    messagesArea.appendChild(div);
                });
                messagesArea.scrollTop = messagesArea.scrollHeight; // AUTO SCROLL DOWN
            });
        }

        // SEND PRIVATE MESSAGE
        document.getElementById('chat-composer').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rawBody = document.getElementById('msg-input').value.trim();
            if(!rawBody ||!currentUser ||!currentChatId) return;
            document.getElementById('msg-input').value = '';
            await addDoc(collection(db, "chats", currentChatId, "messages"), {messageBody: rawBody, senderName: activeNickname, uid: currentUser.uid, createdAt: serverTimestamp()});
        });

        // SETTINGS
        document.getElementById('btn-settings').onclick = () => {document.getElementById('set-email').innerText = currentUser.email;document.getElementById('settings-modal').classList.remove('hidden');}
        document.getElementById('close-settings').onclick = () => document.getElementById('settings-modal').classList.add('hidden');
        function displayAlert(msg) {const el=document.getElementById('auth-alert');el.textContent=msg;el.classList.remove('hidden');}
        function stripHTML(text) {return text.replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match] || match));}
    </script>
</body>
</html>
