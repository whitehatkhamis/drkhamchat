<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#4C1D95">
<title>KhamChat Pro - Site of the Year</title>
<style>
:root{--bg1:#4C1D95; --bg2:#7C3AED; --bg3:#EDE9FE;--card:rgba(255,255,255,0.95); --text:#1E1B4B; --accent:#FFD700; --accent2:#F59E0B; --green:#22C55E; --red:#EF4444;}
[data-theme="dark"]{--bg1:#2E1065; --bg2:#4C1D95; --bg3:#1E1B4B;--card:rgba(30,27,75,0.9); --text:#F5F3FF; --accent:#FFD700; --accent2:#F59E0B;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);color:var(--text);height:100vh;overflow:hidden;}
.login-box{background:var(--card);backdrop-filter:blur(20px);padding:30px;border-radius:20px;width:90%;max-width:350px;margin:20vh auto;box-shadow:0 8px 32px rgba(76,29,149,0.4);border:2px solid var(--accent);}
.login-box h1{text-align:center;color:var(--accent2);margin-bottom:20px;font-size:32px;font-weight:800;background:linear-gradient(90deg, var(--accent), var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
input{width:100%;padding:14px;margin:10px 0;border:2px solid rgba(124,58,237,0.3);border-radius:12px;font-size:16px;background:var(--card);color:var(--text);outline:none;}
button{width:100%;padding:14px;background:linear-gradient(90deg, var(--accent), var(--accent2));color:#1E1B4B;border:none;border-radius:12px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:bold;}
.toggle{text-align:center;margin-top:15px;color:var(--accent2);cursor:pointer;font-weight:600;}
#chatApp{display:none;height:100%;width:100%;}
.topbar{height:60px;background:var(--card);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 15px;border-bottom:3px solid var(--accent);}
.topbar h1{font-size:22px;font-weight:800;background:linear-gradient(90deg, var(--accent), var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.chat-list{overflow-y:auto;height:calc(100% - 60px);padding-bottom:10px;}
.chat-item{display:flex;padding:14px;gap:12px;cursor:pointer;background:var(--card);margin:8px;border-radius:18px;}
.avatar{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg, var(--accent), var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;color:#1E1B4B;font-weight:bold;}
.chat-screen{display:none;flex-direction:column;height:100%;width:100%;}
.chat-header{height:60px;background:var(--card);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 15px;border-bottom:3px solid var(--accent);font-size:18px;font-weight:700;color:var(--accent2);gap:10px;}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px;}
.message{padding:12px 16px;border-radius:18px;max-width:78%;word-wrap:break-word;}
.me{background:linear-gradient(135deg, var(--accent), var(--accent2));color:#1E1B4B;align-self:flex-end;}
.other{background:var(--card);color:var(--text);align-self:flex-start;border:2px solid rgba(124,58,237,0.2);}
.input-area{display:flex;padding:10px;background:var(--card);gap:8px;border-top:3px solid var(--accent);position:fixed;bottom:0;left:0;width:100%;}
.chat-input{flex:1;padding:14px 18px;border:none;border-radius:25px;background:var(--card);color:var(--text);font-size:16px;outline:none;border:2px solid rgba(124,58,237,0.3);}
.send-btn{padding:14px;background:linear-gradient(90deg, var(--accent), var(--accent2));color:#1E1B4B;border:none;border-radius:50%;width:48px;height:48px;}
#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--bg1), var(--bg2));display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:20px;}
.loader{border:5px solid rgba(255,215,0,0.3);border-top:5px solid var(--accent);border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loadingScreen"><div class="loader"></div><h2 style="color:var(--accent)">KhamChat</h2></div>

<div id="loginScreen" style="display:none;">
    <div class="login-box">
        <h1>KhamChat</h1>
        <input id="username" type="text" placeholder="Choose Username" />
        <input id="email" type="email" placeholder="Enter Email" />
        <input id="password" type="password" placeholder="Enter Password" />
        <button id="authBtn" onclick="auth()">Login</button>
        <div class="toggle" id="toggleText" onclick="toggleForm()">Don't have account? Register</div>
        <p id="error" style="color:var(--red);text-align:center;margin-top:10px;"></p>
    </div>
</div>

<div id="chatApp">
    <div id="homeScreen">
        <div class="topbar"><h1>KhamChat</h1></div>
        <div class="chat-list" id="chatList">
            <div class="chat-item" onclick="openChat('global','Global Room')"><div class="avatar">🌍</div><div><b>Global Room</b></div></div>
            <div class="chat-item" onclick="openChat('groq-ai','Groq AI Bot')"><div class="avatar">🤖</div><div><b>Groq AI Bot</b></div></div>
            <div id="privateChats"></div>
        </div>
    </div>
    <div id="chatScreen" class="chat-screen">
        <div class="chat-header" onclick="goHome()">← <span id="roomName">Back</span></div>
        <div class="messages" id="messages"></div>
        <div class="input-area"><input class="chat-input" id="messageInput" placeholder="Type a message..." /><button class="send-btn" onclick="sendMessage()">➤</button></div>
    </div>
</div>

<script type="module">
// THE FIX: Using Skypack CDN instead of gstatic
import { initializeApp } from "https://cdn.skypack.dev/firebase@10.13.2/app";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://cdn.skypack.dev/firebase@10.13.2/auth";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc } from "https://cdn.skypack.dev/firebase@10.13.2/firestore";

const firebaseConfig = {apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",authDomain: "khamchat-vip.firebaseapp.com",projectId: "khamchat-vip",storageBucket: "khamchat-vip.firebasestorage.app",messagingSenderId: "1085659754446",appId: "1:1085659754446:web:2d61fd965ef97044aec59f"};
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

let currentUser=null,currentRoom="global",unsubscribe=null,isLogin=true,userProfile={};

window.toggleForm=function(){isLogin=!isLogin;document.getElementById("authBtn").innerText=isLogin?"Login":"Register";document.getElementById("toggleText").innerText=isLogin?"Don't have account? Register":"Have an account? Login";}
window.auth=async function(){const username=document.getElementById("username").value;const email=document.getElementById("email").value;const password=document.getElementById("password").value;try{if(isLogin){await signInWithEmailAndPassword(auth,email,password);}else{if(username===""){alert("Enter username");return;}const userCred=await createUserWithEmailAndPassword(auth,email,password);await setDoc(doc(db,"users",userCred.user.uid),{username,email,online:true});}}catch(e){document.getElementById("error").innerText=e.message;}}

onAuthStateChanged(auth,async(user)=>{document.getElementById("loadingScreen").style.display="none";if(user){currentUser=user;const userDoc=await getDoc(doc(db,"users",user.uid));if(userDoc.exists())userProfile=userDoc.data();document.getElementById("loginScreen").style.display="none";document.getElementById("chatApp").style.display="block";loadPrivateUsers();}else{document.getElementById("loginScreen").style.display="flex";document.getElementById("chatApp").style.display="none";}});

window.openChat=async function(room,name){currentRoom=room;document.getElementById("roomName").innerText=name;document.getElementById("homeScreen").style.display="none";document.getElementById("chatScreen").style.display="flex";if(unsubscribe)unsubscribe();loadMessages();}
window.goHome=function(){document.getElementById("homeScreen").style.display="block";document.getElementById("chatScreen").style.display="none";if(unsubscribe)unsubscribe();}

window.sendMessage=async function(){const input=document.getElementById("messageInput");const text=input.value.trim();if(!text)return;const displayName=userProfile.username||currentUser.email.split("@")[0];if(currentRoom==="groq-ai"){await addDoc(collection(db,"groq-ai"),{name:displayName,uid:currentUser.uid,text,createdAt:serverTimestamp()});callGroqAPI(text);}else{await addDoc(collection(db,"messages"),{room:currentRoom,name:displayName,uid:currentUser.uid,text,createdAt:serverTimestamp()});}input.value="";}

async function callGroqAPI(userMsg){const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:userMsg})});const data=await res.json();await addDoc(collection(db,"groq-ai"),{name:"Groq AI",uid:"ai",text:data.reply,createdAt:serverTimestamp()});}

function loadMessages(){const box=document.getElementById("messages");let q=query(collection(db,"messages"),orderBy("createdAt"));if(currentRoom==="groq-ai")q=query(collection(db,"groq-ai"),orderBy("createdAt"));unsubscribe=onSnapshot(q,(snapshot)=>{box.innerHTML="";snapshot.forEach(docSnap=>{const msg=docSnap.data();if(currentRoom!=="groq-ai"&&currentRoom!=="global"&&msg.room!==currentRoom)return;if(currentRoom==="global"&&msg.room!=="global")return;box.innerHTML+=`<div class="message ${msg.uid===currentUser.uid?'me':'other'}">${msg.uid!==currentUser.uid?`<b style="font-size:12px;color:var(--accent2);">${msg.name}</b><br>`:""}${msg.text}</div>`;});box.scrollTop=box.scrollHeight;});}

async function loadPrivateUsers(){const usersBox=document.getElementById("privateChats");onSnapshot(collection(db,"users"),(snapshot)=>{usersBox.innerHTML="";snapshot.forEach(docSnap=>{if(docSnap.id!==currentUser.uid){const data=docSnap.data();const roomId=[currentUser.uid,docSnap.id].sort().join("_");const div=document.createElement("div");div.className="chat-item";div.innerHTML=`<div class="avatar">${data.username[0]}</div><div><b>${data.username}</b></div>`;div.onclick=()=>openChat(roomId,data.username);usersBox.appendChild(div);}});});}
</script>
</body>
</html>
