<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KhamChat Pro</title>
<style>
:root{
    --bg1:#4C1D95; --bg2:#7C3AED; --bg3:#EDE9FE; /* Purple Gradient */
    --card:rgba(255,255,255,0.9); --text:#1E1B4B; --accent:#FFD700; --accent2:#F59E0B; /* Golden */
}
[data-theme="dark"]{
    --bg1:#2E1065; --bg2:#4C1D95; --bg3:#1E1B4B;
    --card:rgba(30,27,75,0.8); --text:#F5F3FF; --accent:#FFD700; --accent2:#F59E0B;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);color:var(--text);}

.login-box{background:var(--card);backdrop-filter:blur(20px);padding:30px;border-radius:20px;width:90%;max-width:350px;margin:auto;margin-top:20vh;box-shadow:0 8px 32px rgba(76,29,149,0.3);border:1px solid rgba(255,215,0,0.3);}
.login-box h1{text-align:center;color:var(--accent2);margin-bottom:20px;font-size:28px;font-weight:800;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid rgba(124,58,237,0.3);border-radius:10px;font-size:16px;background:var(--card);color:var(--text);outline:none;}
button{width:100%;padding:12px;background:linear-gradient(90deg, var(--accent), var(--accent2));color:#1E1B4B;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:bold;}
button:hover{transform:scale(1.02);}
.toggle{text-align:center;margin-top:15px;color:var(--accent2);cursor:pointer;font-weight:600;}
#chatApp{display:none;height:100%;width:100%;}

.topbar{height:55px;background:var(--card);backdrop-filter:blur(15px);display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100;}
.topbar h1{font-size:20px;font-weight:800;background:linear-gradient(90deg, var(--accent), var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-icons{margin-left:auto;display:flex;gap:15px;font-size:22px;cursor:pointer;}

.chat-list{overflow-y:auto;height:calc(100% - 55px);background:transparent;padding-bottom:10px;}
.chat-item{display:flex;padding:15px;gap:12px;cursor:pointer;border-bottom:1px solid rgba(124,58,237,0.2);background:var(--card);margin:8px;border-radius:15px;transition:0.2s;}
.chat-item:hover{background:rgba(255,215,0,0.1);}
.avatar{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg, var(--accent), var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;color:#1E1B4B;flex-shrink:0;font-weight:bold;}

.chat-screen{display:none;flex-direction:column;height:100%;width:100%;}
.chat-header{height:55px;background:var(--card);backdrop-filter:blur(15px);display:flex;align-items:center;padding:0 15px;border-bottom:2px solid var(--accent);font-size:18px;font-weight:700;color:var(--accent2);flex-shrink:0;position:sticky;top:0;z-index:100;gap:10px;}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;padding-bottom:90px;}
.message{padding:12px 16px;border-radius:18px;max-width:75%;word-wrap:break-word;}
.me{background:linear-gradient(135deg, var(--accent), var(--accent2));color:#1E1B4B;align-self:flex-end;border-bottom-right-radius:5px;font-weight:500;}
.other{background:var(--card);backdrop-filter:blur(10px);color:var(--text);align-self:flex-start;border-bottom-left-radius:5px;border:1px solid rgba(124,58,237,0.3);}

.input-area{display:flex;padding:12px;background:var(--card);backdrop-filter:blur(15px);gap:10px;border-top:2px solid var(--accent);position:fixed;bottom:0;left:0;width:100%;z-index:200;align-items:center;}
.chat-input{flex:1;padding:14px 18px;border:none;border-radius:25px;background:var(--card);color:var(--text);font-size:16px;outline:none;border:1px solid rgba(124,58,237,0.3);min-height:45px;}
.send-btn{padding:14px;background:linear-gradient(90deg, var(--accent), var(--accent2));color:#1E1B4B;border:none;border-radius:50%;cursor:pointer;font-weight:bold;font-size:20px;width:45px;height:45px;display:flex;align-items:center;justify-content:center;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;}
.modal-content{background:var(--card);padding:20px;border-radius:20px;width:90%;max-width:400px;border:2px solid var(--accent);}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(124,58,237,0.2);}
select{padding:8px;border-radius:8px;background:var(--card);color:var(--text);border:1px solid rgba(124,58,237,0.3);}

#loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, var(--bg1), var(--bg2));display:flex;align-items:center;justify-content:center;z-index:999;}
.loader{border:4px solid rgba(255,215,0,0.3);border-top:4px solid var(--accent);border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loadingScreen">
    <div class="loader"></div>
</div>

<div id="loginScreen" style="display:none;">
    <div class="login-box">
        <h1>KhamChat</h1>
        <input id="username" type="text" placeholder="Choose Username" />
        <input id="email" type="email" placeholder="Enter Email" />
        <input id="password" type="password" placeholder="Enter Password" />
        <button id="authBtn" onclick="auth()">Login</button>
        <div class="toggle" id="toggleText" onclick="toggleForm()">Don't have account? Register</div>
        <p id="error" style="color:#EF4444;text-align:center;margin-top:10px;"></p>
    </div>
</div>

<div id="chatApp">
    <div id="homeScreen">
        <div class="topbar">
            <h1>KhamChat</h1>
            <div class="top-icons">
                <span onclick="openSettings()">⚙️</span>
                <span onclick="logout()">🚪</span>
            </div>
        </div>
        <div class="chat-list" id="chatList">
            <div class="chat-item" onclick="openChat('global','Global Room')">
                <div class="avatar">🌍</div><div><b>Global Room</b></div>
            </div>
            <div class="chat-item" onclick="openChat('groq-ai','Groq AI Bot')">
                <div class="avatar">🤖</div><div><b>Groq AI Bot</b></div>
            </div>
            <div id="privateChats"></div>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="chat-header" onclick="goHome()">← <span id="roomName">Back</span></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input class="chat-input" id="messageInput" placeholder="Type a message..." />
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>Settings</h2>
        <div class="setting-row">
            <span>Theme</span>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>
        <button onclick="closeSettings()">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
authDomain: "khamchat-vip.firebaseapp.com",
projectId: "khamchat-vip",
storageBucket: "khamchat-vip.firebasestorage.app",
messagingSenderId: "1085659754446",
appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentRoom = "global";
let unsubscribe = null;
let isLogin = true;
let userProfile = {};

function applyTheme(){
    const theme = localStorage.getItem("theme") || "system";
    if(theme === "dark"){ document.documentElement.setAttribute("data-theme", "dark"); }
    else{ document.documentElement.removeAttribute("data-theme"); }
    document.getElementById("themeSelect").value = theme;
}
applyTheme();

window.changeTheme = function(){ const theme = document.getElementById("themeSelect").value; localStorage.setItem("theme", theme); applyTheme(); }
window.openSettings = ()=>{document.getElementById("settingsModal").style.display="flex"}
window.closeSettings = ()=>{document.getElementById("settingsModal").style.display="none"}

window.toggleForm = function(){ isLogin =!isLogin; document.getElementById("authBtn").innerText = isLogin? "Login" : "Register"; document.getElementById("toggleText").innerText = isLogin? "Don't have account? Register" : "Have an account? Login"; }
window.auth = async function(){
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    document.getElementById("error").innerText = "";
    try{
        if(isLogin){ await signInWithEmailAndPassword(auth, email, password); }
        else{
            if(username === ""){alert("Please enter username"); return;}
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, "users", userCred.user.uid), { username: username, email: email });
        }
    }catch(e){ document.getElementById("error").innerText = e.message; }
}

window.logout = async function(){
    await signOut(auth);
    localStorage.clear();
    location.reload();
}

onAuthStateChanged(auth, async (user) => {
    document.getElementById("loadingScreen").style.display = "none";
    if(user){
        currentUser = user;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if(userDoc.exists()) userProfile = userDoc.data();
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("chatApp").style.display = "block";
        loadPrivateUsers();
    } else {
        currentUser = null;
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("chatApp").style.display = "none";
    }
});

window.openChat = async function(room, name){
    if(room!== "global" && room!== "groq-ai"){
        const uid = room.split("_").find(id => id!== currentUser.uid);
        const userDoc = await getDoc(doc(db, "users", uid));
        if(userDoc.exists()) name = userDoc.data().username;
    }
    currentRoom = room;
    document.getElementById("roomName").innerText = name;
    document.getElementById("homeScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "flex";
    if(unsubscribe) unsubscribe();
    loadMessages();
}
window.goHome = function(){ document.getElementById("homeScreen").style.display = "block"; document.getElementById("chatScreen").style.display = "none"; if(unsubscribe) unsubscribe(); }

window.sendMessage = async function(){
    const input = document.getElementById("messageInput");
    const text = input.value.trim(); if(!text) return;
    const displayName = userProfile.username || currentUser.email.split("@")[0];

    if(currentRoom === "groq-ai"){
        await addDoc(collection(db,"groq-ai"),{name:displayName,uid:currentUser.uid,text,createdAt:serverTimestamp()});
        callGroqAPI(text);
    }else{
        await addDoc(collection(db,"messages"),{room:currentRoom,name:displayName,uid:currentUser.uid,text,createdAt:serverTimestamp()});
    }
    input.value = "";
};

async function callGroqAPI(userMsg){
    try{
        const res = await fetch("/api/chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ message: userMsg })
        });
        const data = await res.json();
        await addDoc(collection(db,"groq-ai"),{name:"Groq AI",uid:"ai",text:data.reply,createdAt:serverTimestamp()});
    } catch(error){ alert("AI Error: " + error.message); }
}

function loadMessages(){
    const box = document.getElementById("messages");
    let q = query(collection(db,"messages"),orderBy("createdAt"));
    if(currentRoom === "groq-ai") q = query(collection(db,"groq-ai"),orderBy("createdAt"));
    unsubscribe = onSnapshot(q,(snapshot)=>{
        box.innerHTML = ""; snapshot.forEach(doc=>{
            const msg = doc.data();
            if(currentRoom!== "groq-ai" && currentRoom!== "global" && msg.room!== currentRoom) return;
            if(currentRoom === "global" && msg.room!== "global") return;
            box.innerHTML += `<div class="message ${msg.uid===currentUser.uid?'me':'other'}">${msg.uid!==currentUser.uid? `<b style="font-size:12px;color:var(--accent2);">${msg.name}</b><br>` : ''}${msg.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

async function loadPrivateUsers(){
    const usersBox = document.getElementById("privateChats");
    onSnapshot(collection(db,"messages"),async (snapshot)=>{
        let users = {};
        for(const docSnap of snapshot.docs){
            const data = docSnap.data();
            if(data.uid!== currentUser.uid &&!users[data.uid]){
                const userDoc = await getDoc(doc(db, "users", data.uid));
                users[data.uid] = userDoc.exists()? userDoc.data().username : data.name;
            }
        }
        usersBox.innerHTML = "";
        Object.keys(users).forEach(uid=>{
            const roomId = [currentUser.uid,uid].sort().join("_");
            const div = document.createElement("div"); div.className = "chat-item";
            div.innerHTML = `<div class="avatar">${users[uid][0]}</div><div><b>${users[uid]}</b></div>`;
            div.onclick = ()=>openChat(roomId, users[uid]); usersBox.appendChild(div);
        });
    });
}
</script>
</body>
</html>
