<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KhamChat Pro</title>
<style>
:root{
    --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364;
    --card:rgba(255,255,255,0.1); --text:#fff; --accent:#FFD700;
}
[data-theme="light"]{
    --bg1:#f0f2f5; --bg2:#e4e6eb; --bg3:#d9dde3;
    --card:rgba(255,255,255,0.8); --text:#000; --accent:#FF8C00;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);color:var(--text);}

/* LOGIN */
.login-box{background:var(--card);backdrop-filter:blur(15px);padding:30px;border-radius:20px;width:90%;max-width:350px;margin:auto;margin-top:20vh;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);}
.login-box h1{text-align:center;color:var(--accent);margin-bottom:20px;font-size:28px;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid rgba(128,128,128,0.3);border-radius:10px;font-size:16px;background:var(--card);color:var(--text);outline:none;}
button{width:100%;padding:12px;background:linear-gradient(90deg, var(--accent), #FFA500);color:#000;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:bold;}
.toggle{text-align:center;margin-top:15px;color:var(--accent);cursor:pointer;}
#chatApp{display:none;height:100%;width:100%;}

/* TOPBAR */
.topbar{height:55px;background:var(--card);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 15px;border-bottom:1px solid rgba(128,128,128,0.2);position:sticky;top:0;z-index:100;}
.topbar h1{font-size:20px;font-weight:bold;color:var(--accent);}
.top-icons{margin-left:auto;display:flex;gap:15px;font-size:22px;cursor:pointer;}

.chat-list{overflow-y:auto;height:calc(100% - 55px);background:transparent;padding-bottom:10px;}
.chat-item{display:flex;padding:15px;gap:12px;cursor:pointer;border-bottom:1px solid rgba(128,128,128,0.2);background:var(--card);margin:8px;border-radius:15px;}
.avatar{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg, var(--accent), #FFA500);display:flex;align-items:center;justify-content:center;font-size:24px;color:#000;flex-shrink:0;}

/* CHAT SCREEN */
.chat-screen{display:none;flex-direction:column;height:100%;width:100%;}
.chat-header{height:55px;background:var(--card);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 15px;border-bottom:1px solid rgba(128,128,128,0.2);font-size:18px;font-weight:600;color:var(--accent);flex-shrink:0;position:sticky;top:0;z-index:100;}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;padding-bottom:80px;}
.message{padding:12px 16px;border-radius:18px;max-width:75%;word-wrap:break-word;}
.me{background:linear-gradient(135deg, var(--accent), #FFA500);color:#000;align-self:flex-end;border-bottom-right-radius:5px;}
.other{background:var(--card);backdrop-filter:blur(10px);color:var(--text);align-self:flex-start;border-bottom-left-radius:5px;border:1px solid rgba(128,128,128,0.2);}

/* INPUT AREA */
.input-area{display:flex;padding:10px;background:var(--card);backdrop-filter:blur(10px);gap:10px;border-top:1px solid rgba(128,128,128,0.2);position:fixed;bottom:0;left:0;width:100%;z-index:200;}
.chat-input{flex:1;padding:12px 18px;border:none;border-radius:25px;background:var(--card);color:var(--text);font-size:16px;outline:none;border:1px solid rgba(128,128,128,0.3);}
.send-btn{padding:12px 20px;background:linear-gradient(90deg, var(--accent), #FFA500);color:#000;border:none;border-radius:50%;cursor:pointer;font-weight:bold;font-size:20px;min-width:45px;}

/* SETTINGS MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;}
.modal-content{background:var(--card);padding:20px;border-radius:20px;width:90%;max-width:400px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(128,128,128,0.2);}
select{padding:8px;border-radius:8px;background:var(--card);color:var(--text);border:1px solid rgba(128,128,128,0.3);}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box">
        <h1 id="appTitle">KhamChat</h1>
        <input id="email" type="email" placeholder="Enter Email" />
        <input id="password" type="password" placeholder="Enter Password" />
        <button id="authBtn" onclick="auth()">Login</button>
        <div class="toggle" id="toggleText" onclick="toggleForm()">Don't have account? Register</div>
        <p id="error" style="color:red;text-align:center;margin-top:10px;"></p>
    </div>
</div>

<!-- CHAT APP -->
<div id="chatApp">
    <div id="homeScreen">
        <div class="topbar">
            <h1 id="appTitle2">KhamChat</h1>
            <div class="top-icons">
                <span onclick="openSettings()">⚙️</span>
                <span onclick="logout()">🚪</span>
            </div>
        </div>
        <div class="chat-list" id="chatList">
            <div class="chat-item" onclick="openChat('global','Global Room')">
                <div class="avatar">🌍</div><div><b id="globalText">Global Room</b></div>
            </div>
            <div class="chat-item" onclick="openChat('groq-ai','Groq AI Bot')">
                <div class="avatar">🤖</div><div><b id="aiText">Groq AI Bot</b></div>
            </div>
            <div id="privateChats"></div>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="chat-header" onclick="goHome()">← <span id="roomName">Back</span></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input class="chat-input" id="messageInput" placeholder="Type a message..." />
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2 id="settingsTitle">Settings</h2>
        <div class="setting-row">
            <span id="themeText">Theme</span>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="system" id="systemText">System</option>
                <option value="light" id="lightText">Light</option>
                <option value="dark" id="darkText">Dark</option>
            </select>
        </div>
        <div class="setting-row">
            <span id="langText">Language</span>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
            </select>
        </div>
        <div class="setting-row">
            <span>Groq API Key</span>
            <input id="groqKey" type="password" placeholder="gsk_..." style="width:60%" />
        </div>
        <button onclick="saveSettings()" id="saveBtn">Save</button>
        <button onclick="closeSettings()" style="background:gray" id="closeBtn">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
authDomain: "khamchat-vip.firebaseapp.com",
projectId: "khamchat-vip",
storageBucket: "khamchat-vip.firebasestorage.app",
messagingSenderId: "1085659754446",
appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentRoom = "global";
let unsubscribe = null;
let isLogin = true;
let lang = localStorage.getItem("lang") || "en";
let groqKey = localStorage.getItem("groqKey") || "";

const translations = {
    en: {login:"Login", register:"Register", noAccount:"Don't have account? Register", haveAccount:"Have an account? Login", email:"Enter Email", pass:"Enter Password", global:"Global Room", ai:"Groq AI Bot", settings:"Settings", theme:"Theme", lang:"Language", save:"Save", close:"Close", system:"System", light:"Light", dark:"Dark", type:"Type a message..."},
    ha: {login:"Shiga", register:"Rajista", noAccount:"Ba ka da account? Rajista", haveAccount:"Kana da account? Shiga", email:"Saka Email", pass:"Saka Password", global:"Dakin Duniya", ai:"Groq AI Bot", settings:"Saituna", theme:"Jigo", lang:"Harshe", save:"Ajiye", close:"Rufe", system:"Na Tsarin", light:"Haske", dark:"Dare", type:"Rubuta sako..."}
}

function applyLang(){
    const t = translations[lang];
    document.getElementById("authBtn").innerText = isLogin? t.login : t.register;
    document.getElementById("toggleText").innerText = isLogin? t.noAccount : t.haveAccount;
    document.getElementById("email").placeholder = t.email;
    document.getElementById("password").placeholder = t.pass;
    document.getElementById("globalText").innerText = t.global;
    document.getElementById("aiText").innerText = t.ai;
    document.getElementById("settingsTitle").innerText = t.settings;
    document.getElementById("themeText").innerText = t.theme;
    document.getElementById("langText").innerText = t.lang;
    document.getElementById("saveBtn").innerText = t.save;
    document.getElementById("closeBtn").innerText = t.close;
    document.getElementById("systemText").innerText = t.system;
    document.getElementById("lightText").innerText = t.light;
    document.getElementById("darkText").innerText = t.dark;
    document.getElementById("messageInput").placeholder = t.type;
}
applyLang();

window.changeLanguage = function(){ lang = document.getElementById("langSelect").value; localStorage.setItem("lang", lang); applyLang(); }
window.changeTheme = function(){ const theme = document.getElementById("themeSelect").value; localStorage.setItem("theme", theme); applyTheme(); }
function applyTheme(){
    const theme = localStorage.getItem("theme") || "system";
    if(theme === "system"){ document.documentElement.removeAttribute("data-theme"); }
    else{ document.documentElement.setAttribute("data-theme", theme); }
    document.getElementById("themeSelect").value = theme;
    document.getElementById("langSelect").value = lang;
    document.getElementById("groqKey").value = groqKey;
}
applyTheme();

window.openSettings = ()=>{document.getElementById("settingsModal").style.display="flex"}
window.closeSettings = ()=>{document.getElementById("settingsModal").style.display="none"}
window.saveSettings = ()=>{groqKey = document.getElementById("groqKey").value; localStorage.setItem("groqKey", groqKey); alert("Settings Saved"); closeSettings();}

window.toggleForm = function(){ isLogin =!isLogin; applyLang(); }
window.auth = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    document.getElementById("error").innerText = "";
    try{
        if(isLogin){ await signInWithEmailAndPassword(auth, email, password); }
        else{ await createUserWithEmailAndPassword(auth, email, password); }
    }catch(e){ document.getElementById("error").innerText = e.message; }
}
window.logout = function(){ signOut(auth); }

onAuthStateChanged(auth, (user) => {
    if(user){ currentUser = user; document.getElementById("loginScreen").style.display = "none"; document.getElementById("chatApp").style.display = "block"; loadPrivateUsers(); }
    else{ currentUser = null; document.getElementById("loginScreen").style.display = "flex"; document.getElementById("chatApp").style.display = "none"; }
});

window.openChat = function(room, name){
    currentRoom = room; document.getElementById("roomName").innerText = name;
    document.getElementById("homeScreen").style.display = "none"; document.getElementById("chatScreen").style.display = "flex";
    if(unsubscribe) unsubscribe(); loadMessages();
}
window.goHome = function(){ document.getElementById("homeScreen").style.display = "block"; document.getElementById("chatScreen").style.display = "none"; if(unsubscribe) unsubscribe(); }

window.sendMessage = async function(){
    const input = document.getElementById("messageInput");
    const text = input.value.trim(); if(!text) return;

    if(currentRoom === "groq-ai"){
        await addDoc(collection(db,"groq-ai"),{name:currentUser.email,uid:currentUser.uid,text,createdAt:serverTimestamp()});
        callGroqAPI(text);
    }else{
        await addDoc(collection(db,"messages"),{room:currentRoom,name:currentUser.email,uid:currentUser.uid,text,createdAt:serverTimestamp()});
    }
    input.value = "";
};

async function callGroqAPI(userMsg){
    if(!groqKey){ alert("Please add Groq API Key in Settings"); return; }
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Authorization":`Bearer ${groqKey}`,"Content-Type":"application/json"},
        body:JSON.stringify({
            model:"llama3-8b-8192",
            messages:[{role:"user",content:userMsg}]
        })
    });
    const data = await res.json();
    const aiReply = data.choices[0].message.content;
    await addDoc(collection(db,"groq-ai"),{name:"Groq AI",uid:"ai",text:aiReply,createdAt:serverTimestamp()});
}

function loadMessages(){
    const box = document.getElementById("messages");
    let q = query(collection(db,"messages"),orderBy("createdAt"));
    if(currentRoom === "groq-ai") q = query(collection(db,"groq-ai"),orderBy("createdAt"));
    unsubscribe = onSnapshot(q,(snapshot)=>{
        box.innerHTML = ""; snapshot.forEach(doc=>{
            const msg = doc.data();
            if(currentRoom!== "groq-ai" && currentRoom!== "global" && msg.room!== currentRoom) return;
            if(currentRoom === "global" && msg.room!== "global") return;
            box.innerHTML += `<div class="message ${msg.uid===currentUser.uid?'me':'other'}">${msg.uid!==currentUser.uid? `<b style="font-size:12px;color:var(--accent);">${msg.name}</b><br>` : ''}${msg.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPrivateUsers(){
    const usersBox = document.getElementById("privateChats");
    onSnapshot(collection(db,"messages"),(snapshot)=>{
        let users = {}; snapshot.forEach(doc=>{ const data = doc.data(); if(data.uid!== currentUser.uid) users[data.uid] = data.name; });
        usersBox.innerHTML = ""; Object.keys(users).forEach(uid=>{
            const roomId = [currentUser.uid,uid].sort().join("_");
            const div = document.createElement("div"); div.className = "chat-item";
            div.innerHTML = `<div class="avatar">${users[uid][0]}</div><div><b>${users[uid]}</b></div>`;
            div.onclick = ()=>openChat(roomId, users[uid]); usersBox.appendChild(div);
        });
    });
}
</script>
</body>
</html>
