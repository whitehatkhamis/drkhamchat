<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KhamChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#111b21;overflow:hidden;height:100vh;color:#e9edef;}
.header{padding:12px 16px;background:#202c33;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:22px;color:#00a884;}
.search{margin:10px 16px;background:#202c33;border-radius:20px;padding:10px 15px;display:flex;gap:10px;align-items:center;}
.search input{background:transparent;border:none;outline:none;color:#fff;width:100%;}
.filters{display:flex;gap:8px;padding:0 16px;margin-bottom:10px;}
.filter{padding:8px 16px;border-radius:20px;background:#202c33;color:#aebac1;font-size:14px;cursor:pointer;}
.filter.active{background:#00a884;color:#111b21;font-weight:bold;}
.chat-list{overflow-y:auto;height:calc(100vh - 160px);-webkit-overflow-scrolling:touch;}
.chat-item{display:flex;padding:12px 16px;gap:12px;cursor:pointer;border-bottom:1px solid #1f2c34;}
.chat-item:hover{background:#1f2c34;}
.avatar{width:50px;height:50px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:#111b21;}
.chat-info{flex:1;}
.chat-name{font-weight:bold;font-size:16px;}
.chat-last{font-size:14px;color:#8696a0;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;background:#00a884;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;color:#111b21;font-weight:bold;}
.bottom-nav{position:fixed;bottom:0;width:100%;height:70px;background:#202c33;display:flex;justify-content:space-around;align-items:center;}
.nav-item{text-align:center;color:#8696a0;font-size:12px;cursor:pointer;}
.nav-item.active{color:#00a884;}
.nav-icon{font-size:24px;margin-bottom:4px;}
.chat-screen{display:none;height:100vh;flex-direction:column;}
.topbar{padding:15px;background:#202c33;font-weight:bold;display:flex;align-items:center;gap:10px;cursor:pointer;}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.message{padding:10px 14px;border-radius:10px;max-width:75%;word-wrap:break-word;}
.me{background:#005c4b;align-self:flex-end;border-top-right-radius:2px;}
.other{background:#202c33;align-self:flex-start;border-top-left-radius:2px;}
.time{font-size:10px;opacity:.7;margin-top:5px;text-align:right;}
.input-area{display:flex;padding:10px;background:#202c33;gap:10px;}
input{flex:1;padding:12px;border:none;outline:none;border-radius:10px;background:#2a3942;color:#fff;}
button{padding:12px 20px;background:#00a884;color:#111b21;border:none;border-radius:10px;cursor:pointer;font-weight:bold;}
.empty{text-align:center;padding:50px 20px;color:#8696a0;}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen">
    <div class="header">
        <h1>KhamChat</h1>
        <div>📷 ⋮</div>
    </div>
    <div class="search">🔍 <input placeholder="Ask Meta AI or Search" /></div>
    <div class="filters">
        <div class="filter active">All</div>
        <div class="filter">Unread</div>
        <div class="filter">Groups</div>
    </div>
    <div class="chat-list" id="chatList">
        <div class="chat-item" onclick="openChat('global','🌍 Global Room')">
            <div class="avatar">🌍</div>
            <div class="chat-info">
                <div class="chat-name">Global Room</div>
                <div class="chat-last">Duk kowa yana nan</div>
            </div>
        </div>
        <div class="chat-item" onclick="openChat('rob-ai','🤖 Rob Khamis AI')">
            <div class="avatar">🤖</div>
            <div class="chat-info">
                <div class="chat-name">Rob Khamis AI</div>
                <div class="chat-last">AI Assistant</div>
            </div>
        </div>
        <div id="privateChats"></div>
    </div>
    <div class="fab" onclick="alert('Feature coming soon')">+</div>
    <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">💬</div>Chats</div>
        <div class="nav-item"><div class="nav-icon">🔄</div>Updates</div>
        <div class="nav-item"><div class="nav-icon">👥</div>Communities</div>
        <div class="nav-item"><div class="nav-icon">📞</div>Calls</div>
    </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="chat-screen">
    <div class="topbar" onclick="goHome()">← <span id="roomName">Back</span></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input id="messageInput" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
authDomain: "khamchat-vip.firebaseapp.com",
projectId: "khamchat-vip",
storageBucket: "khamchat-vip.firebasestorage.app",
messagingSenderId: "1085659754446",
appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// UID YA DAURE
let guestId = localStorage.getItem("khamchat_uid");
if(!guestId){
    guestId = "guest_" + Math.random().toString(36).substring(2,9);
    localStorage.setItem("khamchat_uid", guestId);
}
let guestName = localStorage.getItem("khamchat_name");
if(!guestName){
    guestName = "User" + Math.floor(Math.random()*9999);
    localStorage.setItem("khamchat_name", guestName);
}

let currentRoom = "global";
let currentRoomName = "Global Room";
let unsubscribe = null;

window.openChat = function(room, name){
    currentRoom = room;
    currentRoomName = name;
    document.getElementById("roomName").innerText = name;
    document.getElementById("homeScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "flex";
    if(unsubscribe) unsubscribe();
    loadMessages();
}

window.goHome = function(){
    document.getElementById("homeScreen").style.display = "block";
    document.getElementById("chatScreen").style.display = "none";
    if(unsubscribe) unsubscribe();
    loadPrivateUsers();
}

window.sendMessage = async function(){
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if(!text) return;

    if(currentRoom === "rob-ai"){
        await addDoc(collection(db,"rob-ai"),{name:guestName,uid:guestId,text,createdAt:serverTimestamp()});
        setTimeout(async()=>{
            await addDoc(collection(db,"rob-ai"),{name:"Rob Khamis AI",uid:"ai",text:"Na samu: " + text,createdAt:serverTimestamp()});
        },1000)
    }else{
        await addDoc(collection(db,"messages"),{room:currentRoom,name:guestName,uid:guestId,text,createdAt:serverTimestamp()});
    }
    input.value = "";
};

function loadMessages(){
    const box = document.getElementById("messages");
    let q;
    if(currentRoom === "rob-ai"){
        q = query(collection(db,"rob-ai"),orderBy("createdAt"));
    }else{
        q = query(collection(db,"messages"),orderBy("createdAt"));
    }

    unsubscribe = onSnapshot(q,(snapshot)=>{
        box.innerHTML = "";
        snapshot.forEach(doc=>{
            const msg = doc.data();
            if(currentRoom!== "rob-ai" && currentRoom!== "global"){
                if(msg.room!== currentRoom) return;
            }
            if(currentRoom === "global" && msg.room!== "global") return;

            const time = msg.createdAt?.toDate? msg.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : "";
            box.innerHTML += `
            <div class="message ${msg.uid===guestId?'me':'other'}">
            ${msg.uid!==guestId? `<b>${msg.name}</b><br>` : ''}
            ${msg.text}
            <div class="time">${time}</div>
            </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPrivateUsers(){
    const usersBox = document.getElementById("privateChats");
    onSnapshot(collection(db,"messages"),(snapshot)=>{
        let users = {};
        snapshot.forEach(doc=>{
            const data = doc.data();
            if(data.uid!== guestId) users[data.uid] = data.name;
        });
        usersBox.innerHTML = "";
        Object.keys(users).forEach(uid=>{
            const roomId = [guestId,uid].sort().join("_");
            const div = document.createElement("div");
            div.className = "chat-item";
            div.innerHTML = `
            <div class="avatar">${users[uid][0]}</div>
            <div class="chat-info">
                <div class="chat-name">${users[uid]}</div>
                <div class="chat-last">Private Chat</div>
            </div>`;
            div.onclick = ()=>openChat(roomId, "💬 " + users[uid]);
            usersBox.appendChild(div);
        });
    });
}

loadPrivateUsers();
</script>
</body>
</html>
