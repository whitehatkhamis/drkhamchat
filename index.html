<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhamChat - Realtime Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 h-screen flex overflow-hidden text-gray-100">

    <div class="w-80 bg-gray-950 flex flex-col justify-between border-r border-gray-800 hidden md:flex">
        <div>
            <div class="p-5 border-b border-gray-800 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white tracking-wider">K</div>
                    <span class="font-bold text-lg tracking-wide bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">KhamChat</span>
                </div>
                <span class="flex h-3 w-3 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
            </div>
            
            <div class="p-4">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Channels</p>
                <div class="space-y-1">
                    <button class="w-full flex items-center space-x-3 bg-gray-800 text-white px-3 py-2.5 rounded-lg text-sm font-medium transition">
                        <span class="text-gray-400">#</span>
                        <span>global-chat</span>
                    </button>
                    <button class="w-full flex items-center space-x-3 text-gray-400 hover:bg-gray-900 hover:text-gray-200 px-3 py-2.5 rounded-lg text-sm font-medium transition opacity-50 cursor-not-allowed">
                        <span class="text-gray-500">#</span>
                        <span>announcements</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-800 bg-gray-950/50 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div id="user-avatar" class="w-9 h-9 bg-purple-600 rounded-full flex items-center justify-center text-sm font-semibold text-white">
                    U
                </div>
                <div>
                    <p id="user-display-name" class="text-sm font-medium text-gray-200">Anonymous</p>
                    <p class="text-xs text-gray-500">Online</p>
                </div>
            </div>
            <button id="change-username-btn" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium transition">Change</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-gray-900">
        
        <div class="h-16 border-b border-gray-800 flex items-center justify-between px-6 bg-gray-900/50 backdrop-blur-sm z-10">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-semibold text-gray-200"># global-chat</span>
                <span class="text-xs px-2 py-0.5 bg-gray-800 rounded-full text-gray-400 border border-gray-700">Live Sync</span>
            </div>
        </div>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
            <div id="loader" class="m-auto text-center py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-500 mx-auto mb-2"></div>
                <p class="text-sm text-gray-400">Connecting to KhamChat...</p>
            </div>
            </div>

        <div class="p-4 bg-gray-950/20 border-t border-gray-800">
            <form id="chat-form" class="flex items-center space-x-3 max-w-5xl mx-auto">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Type a message in #global-chat..." 
                    autocomplete="off"
                    required
                    class="flex-1 bg-gray-800/80 text-gray-100 placeholder-gray-500 text-sm rounded-xl px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-gray-800 transition"
                >
                <button 
                    type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white px-5 py-3.5 rounded-xl font-medium text-sm transition shadow-lg shadow-indigo-600/10 flex items-center space-x-2"
                >
                    <span>Send</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9-2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // Import modern Firebase web SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your provided Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
            authDomain: "khamchat-1d5a4.firebaseapp.com",
            projectId: "khamchat-1d5a4",
            storageBucket: "khamchat-1d5a4.firebasestorage.app",
            messagingSenderId: "515176934851",
            appId: "1:515176934851:web:4ec261196d1ff497666176",
            measurementId: "G-P7JRRZ3M2M"
        };

        // Initialize App & Firestore Database
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State Management
        let currentUsername = localStorage.getItem('khamchat_username') || `User_${Math.floor(1000 + Math.random() * 9000)}`;
        localStorage.setItem('khamchat_username', currentUsername);

        // UI Elements
        const messagesContainer = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const loader = document.getElementById('loader');
        const userDisplayName = document.getElementById('user-display-name');
        const userAvatar = document.getElementById('user-avatar');
        const changeUsernameBtn = document.getElementById('change-username-btn');

        // Update Profile Info on UI
        function updateProfileUI() {
            userDisplayName.textContent = currentUsername;
            userAvatar.textContent = currentUsername.charAt(0).toUpperCase();
        }
        updateProfileUI();

        // Allow changing username
        changeUsernameBtn.addEventListener('click', () => {
            const newName = prompt("Enter your new nickname:", currentUsername);
            if (newName && newName.trim() !== "") {
                currentUsername = newName.trim();
                localStorage.setItem('khamchat_username', currentUsername);
                updateProfileUI();
            }
        });

        // Listen for Realtime Messages from Firestore
        const messagesRef = collection(db, "messages");
        const q = query(messagesRef, orderBy("createdAt", "asc"), limit(100));

        onSnapshot(q, (snapshot) => {
            // Remove loader on first data feedback
            if (loader) loader.remove();
            
            messagesContainer.innerHTML = '';

            if (snapshot.empty) {
                messagesContainer.innerHTML = `
                    <div class="m-auto text-center text-gray-500 py-10">
                        <p class="text-lg font-medium">Room is empty</p>
                        <p class="text-xs">Be the first one to say hello!</p>
                    </div>
                `;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.username === currentUsername;
                
                // Construct structure
                const msgDiv = document.createElement('div');
                msgDiv.className = `flex flex-col max-w-[75%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;

                // Timestamp conversion helper
                let timeString = 'Just now';
                if(data.createdAt) {
                    const date = data.createdAt.toDate();
                    timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                msgDiv.innerHTML = `
                    <span class="text-xs text-gray-500 mb-1 px-1">
                        ${isMe ? 'You' : data.username} <span class="mx-1">•</span> ${timeString}
                    </span>
                    <div class="px-4 py-2.5 rounded-2xl text-sm ${
                        isMe 
                        ? 'bg-indigo-600 text-white rounded-tr-none' 
                        : 'bg-gray-800 text-gray-200 rounded-tl-none'
                    }">
                        ${escapeHTML(data.text)}
                    </div>
                `;
                messagesContainer.appendChild(msgDiv);
            });

            // Auto scroll to bottom when new message arrives
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, (error) => {
            console.error("Error reading database: ", error);
            if (loader) loader.innerHTML = `<p class="text-red-400">Database connection error. Check your Firestore rules.</p>`;
        });

        // Send Message to Firestore
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            // Clear input instantly to prevent double send
            messageInput.value = '';

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    username: currentUsername,
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to send message. Please ensure Firestore is initialized and its rules allow writes.");
            }
        });

        // Utility to prevent XSS script injection
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
