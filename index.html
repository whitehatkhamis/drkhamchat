<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KhamChat Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#07c160;display:flex;align-items:center;justify-content:center;height:100vh;}
.login-box{background:#fff;padding:30px;border-radius:10px;width:90%;max-width:350px;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.login-box h1{text-align:center;color:#07c160;margin-bottom:20px;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;font-size:16px;}
button{width:100%;padding:12px;background:#07c160;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer;margin-top:10px;}
button:hover{background:#06a050;}
.toggle{text-align:center;margin-top:15px;color:#07c160;cursor:pointer;}
#chatApp{display:none;height:100vh;width:100%;}
html,body{height:100%;overflow:hidden;}
.topbar{height:50px;background:#ededed;display:flex;align-items:center;padding:0 15px;border-bottom:1px solid #d9d9d9;}
.chat-list{overflow-y:auto;height:calc(100% - 110px);background:#fff;}
.chat-item{display:flex;padding:12px 15px;gap:12px;cursor:pointer;border-bottom:1px solid #f0f0f0;}
.avatar{width:50px;height:50px;border-radius:5px;background:#07c160;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
.chat-screen{display:none;flex-direction:column;height:100%;background:#ededed;}
.chat-header{height:50px;background:#ededed;display:flex;align-items:center;padding:0 15px;border-bottom:1px solid #d9d9d9;}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.message{padding:10px 14px;border-radius:5px;max-width:70%;}
.me{background:#95ec69;align-self:flex-end;}
.other{background:#fff;align-self:flex-start;}
.input-area{display:flex;padding:8px;background:#f7f7f7;gap:8px;border-top:1px solid #d9d9d9;position:fixed;bottom:0;width:100%;}
input.chat-input{flex:1;padding:10px 15px;border:none;border-radius:20px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box">
        <h1>KhamChat</h1>
        <input id="email" type="email" placeholder="Saka Email" />
        <input id="password" type="password" placeholder="Saka Password" />
        <button id="authBtn" onclick="auth()">Login</button>
        <div class="toggle" id="toggleText" onclick="toggleForm()">Ba ka da account? Register</div>
        <p id="error" style="color:red;text-align:center;margin-top:10px;"></p>
    </div>
</div>

<!-- CHAT APP -->
<div id="chatApp">
    <div id="homeScreen">
        <div class="topbar">
            <h1>KhamChat</h1>
            <button onclick="logout()" style="margin-left:auto;width:auto;padding:5px 15px;">Logout</button>
        </div>
        <div class="chat-list" id="chatList">
            <div class="chat-item" onclick="openChat('global','Global Room')">
                <div class="avatar">🌍</div><div><b>Global Room</b></div>
            </div>
            <div class="chat-item" onclick="openChat('rob-ai','Rob AI')">
                <div class="avatar">🤖</div><div><b>Rob Khamis AI</b></div>
            </div>
            <div id="privateChats"></div>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="chat-header" onclick="goHome()">← <span id="roomName">Back</span></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input class="chat-input" id="messageInput" placeholder="Type a message" />
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
authDomain: "khamchat-vip.firebaseapp.com",
projectId: "khamchat-vip",
storageBucket: "khamchat-vip.firebasestorage.app",
messagingSenderId: "1085659754446",
appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentRoom = "global";
let unsubscribe = null;
let isLogin = true;

window.toggleForm = function(){
    isLogin =!isLogin;
    document.getElementById("authBtn").innerText = isLogin? "Login" : "Register";
    document.getElementById("toggleText").innerText = isLogin? "Ba ka da account? Register" : "Kana da account? Login";
}

window.auth = async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    document.getElementById("error").innerText = "";

    try{
        if(isLogin){
            await signInWithEmailAndPassword(auth, email, password);
        }else{
            await createUserWithEmailAndPassword(auth, email, password);
        }
    }catch(e){
        document.getElementById("error").innerText = e.message;
    }
}

window.logout = function(){
    signOut(auth);
}

onAuthStateChanged(auth, (user) => {
    if(user){
        currentUser = user;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("chatApp").style.display = "block";
        loadPrivateUsers();
    }else{
        currentUser = null;
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("chatApp").style.display = "none";
    }
});

window.openChat = function(room, name){
    currentRoom = room;
    document.getElementById("roomName").innerText = name;
    document.getElementById("homeScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "flex";
    if(unsubscribe) unsubscribe();
    loadMessages();
}

window.goHome = function(){
    document.getElementById("homeScreen").style.display = "block";
    document.getElementById("chatScreen").style.display = "none";
    if(unsubscribe) unsubscribe();
}

window.sendMessage = async function(){
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if(!text) return;

    if(currentRoom === "rob-ai"){
        await addDoc(collection(db,"rob-ai"),{name:currentUser.email,uid:currentUser.uid,text,createdAt:serverTimestamp()});
        setTimeout(async()=>{
            await addDoc(collection(db,"rob-ai"),{name:"Rob AI",uid:"ai",text:"Received: " + text,createdAt:serverTimestamp()});
        },800)
    }else{
        await addDoc(collection(db,"messages"),{room:currentRoom,name:currentUser.email,uid:currentUser.uid,text,createdAt:serverTimestamp()});
    }
    input.value = "";
};

function loadMessages(){
    const box = document.getElementById("messages");
    let q = query(collection(db,"messages"),orderBy("createdAt"));
    if(currentRoom === "rob-ai") q = query(collection(db,"rob-ai"),orderBy("createdAt"));

    unsubscribe = onSnapshot(q,(snapshot)=>{
        box.innerHTML = "";
        snapshot.forEach(doc=>{
            const msg = doc.data();
            if(currentRoom!== "rob-ai" && currentRoom!== "global" && msg.room!== currentRoom) return;
            if(currentRoom === "global" && msg.room!== "global") return;

            box.innerHTML += `
            <div class="message ${msg.uid===currentUser.uid?'me':'other'}">
            ${msg.uid!==currentUser.uid? `<b style="font-size:12px;color:#576b95;">${msg.name}</b><br>` : ''}
            ${msg.text}
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPrivateUsers(){
    const usersBox = document.getElementById("privateChats");
    onSnapshot(collection(db,"messages"),(snapshot)=>{
        let users = {};
        snapshot.forEach(doc=>{
            const data = doc.data();
            if(data.uid!== currentUser.uid) users[data.uid] = data.name;
        });
        usersBox.innerHTML = "";
        Object.keys(users).forEach(uid=>{
            const roomId = [currentUser.uid,uid].sort().join("_");
            const div = document.createElement("div");
            div.className = "chat-item";
            div.innerHTML = `<div class="avatar">${users[uid][0]}</div><div><b>${users[uid]}</b></div>`;
            div.onclick = ()=>openChat(roomId, users[uid]);
            usersBox.appendChild(div);
        });
    });
}
</script>
</body>
</html>
