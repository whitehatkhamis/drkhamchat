<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KhamChat - Premium World Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0b141a; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
       .h-screen-dynamic { height: 100vh; height: calc(var(--vh, 1vh) * 100); }
       .scroller-zone { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b141a; }
        ::-webkit-scrollbar-thumb { background: #222e35; border-radius: 2px; }
    </style>
</head>
<body class="text-gray-200 antialiased select-none">

    <!-- NA CIRE AUTH SCREEN GABA DAYA -->

    <!-- MAIN WHATSAPP COMPONENT LAYOUT DISPLAY -->
    <div id="app-screen" class="w-full h-screen-dynamic flex overflow-hidden">

        <!-- SIDEBAR PANEL -->
        <div id="sidebar-panel" class="w-full md:w-[400px] bg-[#0b141a] flex-col flex-shrink-0 border-r border-[#222e35]">

            <!-- Top Controls -->
            <div class="px-5 pt-4 pb-2 flex-shrink-0">
                <h1 class="text-3xl font-normal text-white text-center tracking-normal my-5">KhamChat</h1>

                <!-- AI/Search Bar -->
                <div onclick="triggerAIBotMode()" class="w-full bg-[#202c33] rounded-full px-5 py-3.5 flex items-center space-x-4 cursor-pointer hover:bg-[#26353d] transition-all shadow-inner border-gray-800/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <span class="text-sm text-gray-400 font-normal">Ask Khamis AI or Search</span>
                </div>
            </div>

            <!-- Scrollable Contacts Grid Area -->
            <div id="contacts-scroller" class="flex-1 scroller-zone px-2 divide-y divide-[#222e35]/30">

                <!-- Room Listing: Live Global Sync Room -->
                <div onclick="switchConversation('GLOBAL_STREAM_ROOM', '🌐 Global Main Feed')" id="chat-target-GLOBAL_STREAM_ROOM" class="chat-list-item flex items-center px-4 py-4 rounded-2xl bg-[#202c33] cursor-pointer mx-2 my-1 transition-all">
                    <div class="w-12 h-12 bg-[#00a884]/20 text-[#00a884] rounded-full flex items-center justify-center font-bold text-xl mr-3.5 flex-shrink-0">🌐</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <h3 class="text-sm font-semibold text-white truncate">Global Main Feed</h3>
                            <span class="text-[9px] bg-[#00a884]/20 text-[#00a884] px-2 py-0.5 rounded-full font-bold">PUBLIC</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mt-0.5">Chat with everyone live worldwide</p>
                    </div>
                </div>

                <!-- Room Listing: Automated AI Instance -->
                <div onclick="switchConversation('KHAMIS_AI_BOT', '🤖 Khamis AI Assistant')" id="chat-target-KHAMIS_AI_BOT" class="chat-list-item flex items-center px-4 py-4 rounded-2xl hover:bg-[#111b21] cursor-pointer mx-2 my-1 transition-all">
                    <div class="w-12 h-12 bg-amber-500 text-slate-950 rounded-full flex items-center justify-center font-bold text-xl mr-3.5 flex-shrink-0 shadow-sm">🤖</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <h3 class="text-sm font-semibold text-gray-200 truncate">Khamis AI Assistant</h3>
                            <span class="text-[9px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded font-bold">SYSTEM</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mt-0.5">Automated prompt intelligence agent</p>
                    </div>
                </div>

                <!-- Dynamic Real-Time Global Registered User Base -->
                <div id="dynamic-users-list" class="space-y-0.5 pt-1">
                    <p class="text-[10px] uppercase text-gray-500 px-4 font-bold tracking-widest my-2">1-to-1 Private Chats</p>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="h-16 bg-[#0b141a] border-t border-[#222e35]/60 flex items-center justify-around text-gray-400 flex-shrink-0 z-10 px-2">
                <div class="flex flex-col items-center justify-center cursor-pointer text-[#00a884] flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                    <span class="text-[10px] font-medium mt-0.5">Chats</span>
                </div>
                <div class="flex flex-col items-center justify-center cursor-pointer hover:text-gray-200 transition-all flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span class="text-[10px] font-medium mt-0.5">Updates</span>
                </div>
                <div class="flex flex-col items-center justify-center cursor-pointer hover:text-gray-200 transition-all flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    <span class="text-[10px] font-medium mt-0.5">Communities</span>
                </div>
                <div class="flex flex-col items-center justify-center cursor-pointer hover:text-gray-200 transition-all flex-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                    <span class="text-[10px] font-medium mt-0.5">Calls</span>
                </div>
            </div>
        </div>

        <!-- MESSAGES CHAT STREAM VIEW WINDOW -->
        <div id="chat-window-frame" class="hidden md:flex flex-1 flex-col h-full bg-[#0b141a] relative">

            <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat;"></div>

            <!-- Active Chat Top Header -->
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-5 border-b border-[#222e35]/60 z-10 flex-shrink-0">
                <div class="flex items-center space-x-3.5">
                    <button onclick="collapseToSidebar()" class="md:hidden text-gray-400 hover:text-white p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <div class="w-10 h-10 bg-[#00a884]/10 text-[#00a884] rounded-full flex items-center justify-center font-bold text-base" id="active-chat-avatar">#</div>
                    <div>
                        <h2 id="active-chat-title" class="text-sm font-semibold text-white tracking-wide">Global Main Feed</h2>
                        <p id="active-chat-status" class="text-xs text-gray-400">Encrypted global cloud channel</p>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages-scroller" class="flex-1 scroller-zone p-6 space-y-4 z-10 flex-col"></div>

            <!-- Message Input -->
            <div class="p-3 bg-[#111b21] border-t border-[#222e35]/60 z-10 flex-shrink-0">
                <form id="form-composer" class="w-full max-w-5xl mx-auto flex items-center space-x-3">
                    <input type="text" id="msg-input" placeholder="Type a real-time message..." autocomplete="off" required class="flex-1 bg-[#2a3942] text-sm text-white placeholder-gray-500 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-[#00a884]">
                    <button type="submit" class="bg-[#00a884] hover:bg-[#009675] text-[#111b21] p-3.5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9-2-9-18-9 18 9-2zm0 0v-8" /></svg></button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, where, or, and } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
            authDomain: "khamchat-1d5a4.firebaseapp.com",
            projectId: "khamchat-1d5a4",
            storageBucket: "khamchat-1d5a4.firebasestorage.app",
            messagingSenderId: "515176934851",
            appId: "1:515176934851:web:4ec261196d1ff497666176"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // GUEST USER TA ATOMATIK BA TARE DA LOGIN BA
        const guestUID = 'guest_' + Math.random().toString(36).substr(2, 9);
        const guestName = 'Guest_' + Math.floor(Math.random() * 10000);

        let activeChatID = "GLOBAL_STREAM_ROOM";
        let activeChatName = "Global Main Feed";
        let unsubscribeCurrentMessages = null;

        const sidebarPanel = document.getElementById('sidebar-panel');
        const chatWindowFrame = document.getElementById('chat-window-frame');
        const dynamicUsersList = document.getElementById('dynamic-users-list');
        const messagesScroller = document.getElementById('messages-scroller');
        const formComposer = document.getElementById('form-composer');
        const msgInput = document.getElementById('msg-input');

        const balanceViewportHeight = () => { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); };
        window.addEventListener('resize', balanceViewportHeight);
        balanceViewportHeight();

        // DIRECT SHIGA NAN DA NAN
        window.onload = () => {
            // Ajiye guest a database
            setDoc(doc(db, "users", guestUID), {
                uid: guestUID,
                displayName: guestName,
                email: guestUID + '@guest.com',
                photoURL: '',
                lastSeen: serverTimestamp()
            }, { merge: true });

            syncLiveUsersList();
            switchConversation(activeChatID, activeChatName);
        };

        function syncLiveUsersList() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                dynamicUsersList.innerHTML = '<p class="text-[10px] uppercase text-gray-500 px-4 font-bold tracking-widest my-2">1-to-1 Private Chats</p>';
                snapshot.forEach((userDoc) => {
                    const userData = userDoc.data();
                    if (userData.uid === guestUID) return;

                    const contactRow = document.createElement('div');
                    contactRow.id = `chat-target-${userData.uid}`;
                    contactRow.className = `chat-list-item flex items-center px-4 py-3.5 rounded-2xl hover:bg-[#202c33]/40 cursor-pointer mx-2 my-0.5 transition-all`;
                    contactRow.onclick = () => switchConversation(userData.uid, userData.displayName);

                    contactRow.innerHTML = `
                        <div class="w-11 h-11 bg-gradient-to-tr from-purple-600 to-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm mr-3.5 flex-shrink-0 uppercase">
                            ${userData.displayName.charAt(0)}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-medium text-gray-200 truncate">${userData.displayName}</h4>
                            <p class="text-[11px] text-gray-500 truncate mt-0.5">Click to open 1-to-1 chat</p>
                        </div>
                    `;
                    dynamicUsersList.appendChild(contactRow);
                });
            });
        }

        window.switchConversation = function(targetID, targetDisplayName) {
            activeChatID = targetID;
            activeChatName = targetDisplayName;
            sidebarPanel.classList.add('hidden'); sidebarPanel.classList.remove('w-full');
            chatWindowFrame.classList.remove('hidden'); chatWindowFrame.classList.add('flex');
            if (window.innerWidth >= 768) { sidebarPanel.classList.remove('hidden'); sidebarPanel.classList.add('w-[400px]'); }

            document.getElementById('active-chat-title').textContent = activeChatName;
            const avatar = document.getElementById('active-chat-avatar');
            if(activeChatID === 'GLOBAL_STREAM_ROOM') { avatar.textContent = "🌐"; document.getElementById('active-chat-status').textContent = "Public global room"; }
            else if(activeChatID === 'KHAMIS_AI_BOT') { avatar.textContent = "🤖"; document.getElementById('active-chat-status').textContent = "Automated assistant"; }
            else { avatar.textContent = activeChatName.charAt(0).toUpperCase(); document.getElementById('active-chat-status').textContent = "Private chat"; }

            streamTargetMessages();
        };

        function streamTargetMessages() {
            if (unsubscribeCurrentMessages) unsubscribeCurrentMessages();
            messagesScroller.innerHTML = `<div class="m-auto text-xs text-gray-500">Loading messages...</div>`;

            let collectionQueryRef;
            if (activeChatID === "GLOBAL_STREAM_ROOM") {
                collectionQueryRef = query(collection(db, "global_channel"), orderBy("createdAt", "asc"), limit(100));
            } else if (activeChatID === "KHAMIS_AI_BOT") {
                collectionQueryRef = query(collection(db, `bot_channel_${guestUID}`), orderBy("createdAt", "asc"), limit(100));
            } else {
                collectionQueryRef = query(collection(db, "private_messages"), or(and(where("senderUID", "==", guestUID), where("recipientUID", "==", activeChatID)), and(where("senderUID", "==", activeChatID), where("recipientUID", "==", guestUID))), orderBy("createdAt", "asc"), limit(100));
            }

            unsubscribeCurrentMessages = onSnapshot(collectionQueryRef, (snapshot) => {
                messagesScroller.innerHTML = '';
                if (snapshot.empty) {
                    messagesScroller.innerHTML = `<div class="my-auto text-center text-gray-500 p-6"><p class="text-sm">No messages yet</p></div>`;
                    return;
                }
                snapshot.forEach((msgDoc) => {
                    const data = msgDoc.data();
                    const isSelfNode = data.senderUID === guestUID;
                    const bubbleShell = document.createElement('div');
                    bubbleShell.className = `flex flex-col w-full ${isSelfNode? 'items-end' : 'items-start'}`;
                    let calculatedTime = data.createdAt? data.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "now";
                    let themeStyles = isSelfNode? "bg-[#005c4b] text-white rounded-tr-none" : "bg-[#202c33] text-gray-100 rounded-tl-none";
                    bubbleShell.innerHTML = `<div class="max-w-[85%]"><div class="px-3.5 py-2.5 rounded-xl text-[14px] ${themeStyles}"><p class="whitespace-pre-wrap">${sanitizePayload(data.messageText)}</p><span class="text-[9px] text-gray-400/80 block text-right mt-1">${calculatedTime}</span></div></div>`;
                    messagesScroller.appendChild(bubbleShell);
                });
                messagesScroller.scrollTop = messagesScroller.scrollHeight;
            });
        }

        formComposer.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text) return;
            msgInput.value = '';
            if (activeChatID === "GLOBAL_STREAM_ROOM") {
                await addDoc(collection(db, "global_channel"), { messageText: text, senderName: guestName, senderUID: guestUID, createdAt: serverTimestamp() });
            } else if (activeChatID === "KHAMIS_AI_BOT") {
                await addDoc(collection(db, `bot_channel_${guestUID}`), { messageText: text, senderName: guestName, senderUID: guestUID, createdAt: serverTimestamp() });
            } else {
                await addDoc(collection(db, "private_messages"), { messageText: text, senderName: guestName, senderUID: guestUID, recipientUID: activeChatID, createdAt: serverTimestamp() });
            }
        });

        window.collapseToSidebar = function() { chatWindowFrame.classList.add('hidden'); chatWindowFrame.classList.remove('flex'); sidebarPanel.classList.remove('hidden'); sidebarPanel.classList.add('w-full'); };
        window.triggerAIBotMode = function() { switchConversation('KHAMIS_AI_BOT', '🤖 Khamis AI Assistant'); };
        function sanitizePayload(str) { return str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m] || m)); }
    </script>
</body>
</html>
