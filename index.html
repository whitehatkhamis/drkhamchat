<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhamChat - Realtime Messenger & AI</title>
    <!-- Tailwind CSS for WhatsApp Modern Style UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111b21; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0b141a] h-screen flex justify-center items-center overflow-hidden text-gray-200 selection:bg-teal-500/30">

    <!-- AUTH MODAL WRAPPER (Shows on initial load) -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#222e35] w-full max-w-md p-8 rounded-2xl border border-gray-700 shadow-2xl text-center">
            <div class="w-16 h-16 bg-teal-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-bold text-[#111b21]">K</div>
            <h2 class="text-2xl font-bold text-white mb-2">Welcome to KhamChat</h2>
            <p class="text-gray-400 text-sm mb-6">Connect and chat instantly with friends and Khamis AI</p>
            
            <form id="auth-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Google Email / Account</label>
                    <input type="email" id="auth-email" required placeholder="name@gmail.com" class="w-full bg-[#2a3942] border border-transparent focus:border-teal-500 rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" class="w-full bg-[#2a3942] border border-transparent focus:border-teal-500 rounded-xl px-4 py-3 text-sm text-white focus:outline-none transition">
                </div>
                <button type="submit" class="w-full bg-teal-500 hover:bg-teal-400 text-[#111b21] font-bold py-3.5 rounded-xl text-sm transition mt-2 shadow-lg shadow-teal-500/10">
                    Continue to KhamChat
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN WHATSAPP CONTAINER -->
    <div class="w-full h-full flex overflow-hidden max-w-[1600px] shadow-2xl">
        
        <!-- SIDEBAR (Left panel) -->
        <div class="w-80 md:w-[400px] bg-[#111b21] border-r border-[#222e35] flex flex-col">
            <!-- Sidebar Header -->
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-4 py-3">
                <div class="flex items-center space-x-3">
                    <div id="user-avatar" class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center font-bold text-[#111b21]">U</div>
                    <div class="overflow-hidden">
                        <p id="user-profile-name" class="text-sm font-semibold truncate text-white">Guest User</p>
                        <p class="text-xs text-teal-400 flex items-center"><span class="w-1.5 h-1.5 bg-teal-400 rounded-full inline-block mr-1"></span> Online</p>
                    </div>
                </div>
            </div>

            <!-- Search bar -->
            <div class="p-2 bg-[#111b21]">
                <div class="bg-[#202c33] flex items-center px-4 py-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <input type="text" placeholder="Search or start new chat" class="bg-transparent text-sm text-white placeholder-gray-400 focus:outline-none w-full">
                </div>
            </div>

            <!-- Chat Threads List -->
            <div class="flex-1 overflow-y-auto divide-y divide-[#222e35]">
                <!-- Global Chat Channel -->
                <div class="flex items-center px-4 py-3 bg-[#2a3942] cursor-pointer border-l-4 border-teal-500">
                    <div class="w-12 h-12 bg-teal-500/20 text-teal-400 rounded-full flex items-center justify-center font-bold text-xl mr-3 flex-shrink-0">#</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <p class="text-sm font-semibold text-white truncate">🌐 Global Chat</p>
                            <span class="text-xs text-teal-400">Live</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mt-0.5">Talk to everyone and ask @khamis</p>
                    </div>
                </div>

                <!-- Khamis AI Contact Item -->
                <div onclick="shortcutAI()" class="flex items-center px-4 py-3 hover:bg-[#202c33] cursor-pointer transition">
                    <div class="w-12 h-12 bg-amber-500 text-[#111b21] rounded-full flex items-center justify-center font-bold text-xl mr-3 flex-shrink-0">🤖</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <p class="text-sm font-semibold text-white truncate">Khamis AI</p>
                            <span class="text-[10px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded">Bot</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mt-0.5">Type @khamis to chat with me</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CHAT APP WINDOW (Right panel) -->
        <div class="flex-1 bg-[#0b141a] flex flex-col relative" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; background-opacity: 0.06;">
            
            <!-- Chat Window Header -->
            <div class="h-16 bg-[#202c33] flex items-center justify-between px-6 border-b border-[#222e35] z-10">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-teal-500/20 text-teal-400 rounded-full flex items-center justify-center font-bold text-lg">#</div>
                    <div>
                        <h3 class="text-sm font-semibold text-white">🌐 Global Chat</h3>
                        <p class="text-xs text-gray-400">Realtime Community Chatroom</p>
                    </div>
                </div>
                <!-- AI Quick Trigger Button -->
                <button onclick="shortcutAI()" class="text-xs bg-[#2a3942] hover:bg-[#374248] text-amber-400 border border-amber-500/30 font-medium px-3 py-1.5 rounded-full transition flex items-center space-x-1">
                    <span>✨ Ask Khamis AI</span>
                </button>
            </div>

            <!-- Messages Stream Area -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-3 flex flex-col">
                <!-- loading state indicator -->
                <div id="loader" class="my-auto text-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-teal-400 mx-auto mb-2"></div>
                    <p class="text-xs text-gray-400">Securing dynamic backend bridge...</p>
                </div>
            </div>

            <!-- Message Entry Bar Container -->
            <div class="p-3 bg-[#202c33] flex items-center border-t border-[#222e35]">
                <form id="chat-form" class="w-full flex items-center space-x-3">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Type a message here... (use @khamis to talk to AI bot)" 
                        autocomplete="off"
                        required
                        class="flex-1 bg-[#2a3942] text-sm text-white placeholder-gray-400 rounded-lg px-4 py-3 focus:outline-none transition"
                    >
                    <button type="submit" class="bg-teal-500 hover:bg-teal-400 text-[#111b21] p-3 rounded-full transition flex-shrink-0 shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9-2-9-18-9 18 9-2zm0 0v-8" /></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- FIREBASE AND CLIENT INTERACTIVE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Verified Firebase Config payload 
        const firebaseConfig = {
            apiKey: "AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",
            authDomain: "khamchat-1d5a4.firebaseapp.com",
            projectId: "khamchat-1d5a4",
            storageBucket: "khamchat-1d5a4.firebasestorage.app",
            messagingSenderId: "515176934851",
            appId: "1:515176934851:web:4ec261196d1ff497666176",
            measurementId: "G-P7JRRZ3M2M"
        };

        // Init Core Components
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core App States
        let clientUser = localStorage.getItem('khamchat_email') || "";
        let clientNickname = localStorage.getItem('khamchat_username') || "";

        // UI Element Hooks
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const messagesContainer = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const loader = document.getElementById('loader');

        // Check active authentication session state
        if (clientUser) {
            authModal.classList.add('hidden');
            renderUserIdentity();
            initRealtimeSync();
        }

        // Intercept Modal Auth Form Completion
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('auth-email').value.trim();
            
            // Derive interactive username handle from credentials
            clientUser = emailInput;
            clientNickname = emailInput.split('@')[0];
            
            localStorage.setItem('khamchat_email', clientUser);
            localStorage.setItem('khamchat_username', clientNickname);
            
            authModal.classList.add('hidden');
            renderUserIdentity();
            initRealtimeSync();
        });

        function renderUserIdentity() {
            document.getElementById('user-profile-name').textContent = clientNickname;
            document.getElementById('user-avatar').textContent = clientNickname.charAt(0).toUpperCase();
        }

        // Realtime Firestore Core Sync Logic
        function initRealtimeSync() {
            const chatCollectionRef = collection(db, "global_messages");
            const cursorQuery = query(chatCollectionRef, orderBy("createdAt", "asc"), limit(80));

            onSnapshot(cursorQuery, (snapshot) => {
                if (loader) loader.remove();
                messagesContainer.innerHTML = '';

                snapshot.forEach((doc) => {
                    const messagePayload = doc.data();
                    const isSelfMessage = messagePayload.senderId === clientUser;
                    const isSystemAI = messagePayload.senderId === "KhamisAI";

                    // Message Wrapper element
                    const messageBubbleRow = document.createElement('div');
                    messageBubbleRow.className = `flex flex-col w-full ${isSelfMessage ? 'items-end' : 'items-start'}`;

                    let displayTime = 'Just Now';
                    if (messagePayload.createdAt) {
                        displayTime = messagePayload.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    // Assign tailored layout themes based on context role types
                    let bubbleColorStyle = "bg-[#202c33] text-gray-200 rounded-tl-none";
                    if (isSelfMessage) {
                        bubbleColorStyle = "bg-[#005c4b] text-white rounded-tr-none";
                    } else if (isSystemAI) {
                        bubbleColorStyle = "bg-gradient-to-r from-amber-600 to-amber-700 text-white font-medium rounded-tl-none border border-amber-500/30";
                    }

                    messageBubbleRow.innerHTML = `
                        <div class="max-w-[75%] min-w-[80px]">
                            <span class="text-[11px] font-semibold tracking-wide text-gray-400 px-1 block mb-0.5 ${isSelfMessage ? 'text-right' : ''}">
                                ${isSystemAI ? '🤖 Khamis AI' : (isSelfMessage ? 'You' : messagePayload.username)}
                            </span>
                            <div class="px-3 py-2 rounded-xl text-sm break-words shadow-sm ${bubbleColorStyle}">
                                <p class="leading-relaxed">${sanitizeMarkup(messagePayload.text)}</p>
                                <span class="text-[9px] text-gray-400/80 block text-right mt-1 select-none">${displayTime}</span>
                            </div>
                        </div>
                    `;
                    messagesContainer.appendChild(messageBubbleRow);
                });

                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        // Dispatch message processing pipeline
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const textContent = messageInput.value.trim();
            if (!textContent) return;

            messageInput.value = '';

            try {
                // 1. Post client text package downstream to firestore
                await addDoc(collection(db, "global_messages"), {
                    text: textContent,
                    username: clientNickname,
                    senderId: clientUser,
                    createdAt: serverTimestamp()
                });

                // 2. Intercept query targets matching bot keyword tags
                if (textContent.toLowerCase().includes('@khamis')) {
                    triggerAIResponse(textContent);
                }

            } catch (err) {
                console.error("Transmission error:", err);
            }
        });

        // Khamis AI Response Mock Engine Logic
        async function triggerAIResponse(userText) {
            // Processing Delay simulation
            setTimeout(async () => {
                let botReply = "Hello! I am Khamis AI. Let me know how I can help you inside KhamChat today! ✨";
                const checkQuery = userText.toLowerCase();

                if (checkQuery.includes('hello') || checkQuery.includes('hi')) {
                    botReply = `Hey there ${clientNickname}! Welcome to KhamChat. I'm here tracking the channel globally.`;
                } else if (checkQuery.includes('help')) {
                    botReply = "Sure thing! You can chat freely here in the main stream room. Tag me anytime using `@khamis` to ask questions!";
                } else if (checkQuery.includes('time') || checkQuery.includes('date')) {
                    botReply = `The current system timeline checks out as: ${new Date().toLocaleString()}`;
                }

                // Add simulated AI generation block down stream to firestone
                await addDoc(collection(db, "global_messages"), {
                    text: botReply,
                    username: "Khamis AI",
                    senderId: "KhamisAI",
                    createdAt: serverTimestamp()
                });
            }, 1000);
        }

        // Prevent layout break scripts
        function sanitizeMarkup(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // Make bot action global scope accessible
        window.shortcutAI = function() {
            messageInput.value = "@khamis ";
            messageInput.focus();
        };
    </script>
</body>
</html>
